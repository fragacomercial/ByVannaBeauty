<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANNA BEAUTY</title>
<style>
body {
  margin: 0;
  font-family: 'sora', sans-serif;
  background: #f19fb9;
  text-align: center;
}

.header {
  background: url('download (2).jpg') center/cover;
  padding: 110px 20px;
  border-bottom-left-radius: 100px;
  border-bottom-right-radius: 100px;
}

.profile {
  margin-top: -50px;
}

.profile img {
  width: 250px;
  height: 250px;
  border-radius: 100%;
  border: 20px solid #F6BFD3;
}

h1 {
  margin: 10px 0 5px;
}

.bio {
  font-size: 18px;
  color: #555;
  max-width: 300px;
  margin: 0 auto 20px;
}

.social {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.social i {
  font-size: 24px;
}

.container {
  padding: 20px;
}

.card {
  background: #FDF0F5;
  border-radius: 30px;
  padding: 15px;
  margin: 10px auto;
  max-width: 350px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 50px;
  height: 50px;
  border-radius: 8px;
}

.button {
  margin-top: 20px;
  padding: 15px;
  border-radius: 60px;
  border: 1px solid #000;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

</style>
</head>
